<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>GLB File Demo</title>
    <style>
        body { margin: 0; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        model-viewer { width: 100%;
                      height: 600px;
                      background-color: #cfcfcf; /* Gris chevere */
                      border-radius: 15px;       /* Bordes redondeados */
                      border: 10px solid #ddd;    /* Un marco sutil */
                     }
    </style>
</head>
<body>

    <h1>Interactive 3D Model</h1>

    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
    
    <model-viewer 
        src="model4.1.glb" 
        ar 
  camera-controls 
  auto-rotate 
  shadow-intensity="1" 
  environment-image="neutral" 
  exposure="1.25">
    </model-viewer>

    <p>Use your mouse to rotate or zoom</p>

</body>

</html>
