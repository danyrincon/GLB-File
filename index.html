<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>GLB File Demo</title>
    <style>
        body { margin: 0; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        model-viewer { width: 100%; height: 80vh; background-color: #f0f0f0; }
        h1 { padding: 20px; }
    </style>
</head>
<body>

    <h1>Interactive 3D Model</h1>

    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
    
    <model-viewer 
        src="S4T1401PP 6TEETH SPROCKET.glb" 
        ar camera-controls auto-rotate shadow-intensity="1">
    </model-viewer>

    <p>Use your mouse to rotate or zoom</p>

</body>
</html>
